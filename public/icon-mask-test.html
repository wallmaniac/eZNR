<!DOCTYPE html>
<html>
<head>
    <style>
        .container {
            display: flex;
            gap: 20px;
            padding: 50px;
            background: #0f172a; /* sidebar color */
        }
        .icon {
            width: 100px;
            height: 100px;
            object-fit: cover;
        }
        .clipped {
            clip-path: inset(5% round 20%);
        }
        .scaled {
            width: 100px;
            height: 100px;
            overflow: hidden;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scaled img {
            width: 110%;
            height: 110%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <p style="color: white">Original with fake grid:</p>
            <img src="icons3d/Radnici.jpeg" class="icon">
        </div>
        <div>
            <p style="color: white">Clipped (inset 5%):</p>
            <img src="icons3d/Radnici.jpeg" class="icon clipped">
        </div>
        <div>
            <p style="color: white">Scale + Container Radius:</p>
            <div class="scaled">
                <img src="icons3d/Radnici.jpeg">
            </div>
        </div>
    </div>
</body>
</html>
